name: Release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate Tag Version
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      tag_version: ${{ steps.validate.outputs.tag_version }}
      workspace_version: ${{ steps.validate.outputs.workspace_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate tag matches workspace version
        id: validate
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          workspace_version="$({
            awk '
              $0 ~ /^\[workspace\.package\]/ { in_section = 1; next }
              $0 ~ /^\[/ { in_section = 0 }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          })"

          if [[ -z "${workspace_version}" ]]; then
            echo "Failed to read [workspace.package].version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${tag_version}" != "${workspace_version}" ]]; then
            echo "Tag version v${tag_version} does not match Cargo.toml version ${workspace_version}" >&2
            exit 1
          fi

          echo "tag_version=${tag_version}" >> "${GITHUB_OUTPUT}"
          echo "workspace_version=${workspace_version}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: validate-version
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            archive_name: mnemosyne-cli-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_name: mnemosyne-cli-aarch64-unknown-linux-gnu.tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_name: mnemosyne-cli-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            use_cross: false
            archive_name: mnemosyne-cli-aarch64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_name: mnemosyne-cli-x86_64-pc-windows-msvc.zip
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Add Rust target
        if: ${{ !matrix.use_cross }}
        run: rustup target add "${{ matrix.target }}"

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --version 0.2.5 --locked

      - name: Build mnemosyne-cli
        run: |
          set -euo pipefail

          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target "${{ matrix.target }}" -p mnemosyne-cli
          else
            cargo build --release --target "${{ matrix.target }}" -p mnemosyne-cli
          fi

      - name: Package binary
        run: |
          set -euo pipefail

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/mnemosyne-cli.exe" ./mnemosyne-cli.exe
            7z a "${{ matrix.archive_name }}" ./mnemosyne-cli.exe
          else
            cp "target/${{ matrix.target }}/release/mnemosyne-cli" ./mnemosyne-cli
            tar czf "${{ matrix.archive_name }}" ./mnemosyne-cli
          fi

      - name: Upload packaged binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: package-${{ matrix.target }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: validate-version
    permissions: { packages: write }
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/mnemosyne
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate-version.outputs.tag_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate-version.outputs.tag_version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate-version.outputs.tag_version }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - docker
    permissions: { contents: write }
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: package-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: dist/*